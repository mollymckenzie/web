title: eBird Bird Observation Data
short_title: eBird
description: 'Citizen science bird observation records from eBird, managed by the
  Cornell Lab of Ornithology. Contains species occurrence checklists submitted by
  volunteer observers worldwide, with date, location (latitude/longitude), effort,
  and species count. Data is available via the eBird Basic Dataset (EBD) and the eBird
  API 2.0, in order to download the data, an account will need to be made and a short description of how the data will be used will need to be provided. 

  '
provider:
