id: ebird-state-summaries
version: '1.0'
title: State-Level eBird Data Summaries
provider:
  name: Cornell Lab of Ornithology
  url: https://www.birds.cornell.edu/home/us-state-level-conservation-data-summaries/
filters:
  year: false
  state: true
  county: false
  zipcode: false
